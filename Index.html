<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forever Cars</title>
    <link rel="stylesheet" href="index.css" />
    <script
      src="https://kit.fontawesome.com/76e9b7325c.js"
      crossorigin="anonymous"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <body>
    <main class="">
      <section class="container">
        <div class="header">
          <img
            class="logo-header"
            src="assets/Logo.png"
            alt="Logo ForeverCars"
          />
          <a href="" class="header-lien">Accueil</a>
          <a href="" class="header-lien">Nos véhicules</a>
          <a href="" class="header-lien">Vendez votre véhicule</a>
          <a href="" class="header-lien">Contact</a>
          <a href="" class="header-lien">Nos services</a>
        </div>
      </section>

      <div id="banner-carousel">
        <div class="carousel-inner">
          <img src="assets/banière.png" alt="" />
        </div>
        <div class="arrow">
          <i class="fa-solid fa-chevron-left"></i>
          <i class="fa-solid fa-chevron-right"></i>
        </div>
      </div>

      <div class="search-barre">
        <input type="search" class="input-search" /><i

        ></i>
      </div>

      <!-- Zone de recherche de véhicules !-->

      <div class="about">
        <div class="about-brand">
          <h1 class="about-title">Forever Cars</h1>
          <p class="about-text">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Corrupti
            eligendi fuga dolorum labore perspiciatis, esse nulla doloribus
            aliquid minus impedit?
          </p>
          <a href="about-liens">Nous contacter</a>
        </div>

        <div class="about-pictures">
          <img src="assets/Logo.png" alt="" />
        </div>
      </div>
    </main>
